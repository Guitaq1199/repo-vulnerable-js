name: DevSecOps Pipeline - SAST + Docker Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      # ── SAST: CodeQL ──────────────────────────────────────────────────────────
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3       # v3, not v4
        with:
          languages: javascript

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3    # v3, not v4

      # ── SBOM generation ───────────────────────────────────────────────────────
      - name: Generate SBOM with CycloneDX
        run: npm sbom --sbom-format cyclonedx > sbom.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      # ── Vulnerability scan with Grype ─────────────────────────────────────────
      - name: Scan SBOM with Grype
        uses: anchore/scan-action@v5
        with:
          sbom: sbom.json                  
          fail-build: true
          severity-cutoff: medium
          output-format: table
          only-fixed: false
